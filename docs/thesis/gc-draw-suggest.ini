 为了更直观地说明 Scavenge 算法的执行过程，图 4-x 给出了 GC 启动前、根对象复制、线性扫描与半空间翻转四个阶段的示意图。可以看到，该算法以根集合为起点，将存活对象逐步复制到另一半空间，并在复制完成后整体交换两块空间的角色，从而完成对象回收与空间整理。