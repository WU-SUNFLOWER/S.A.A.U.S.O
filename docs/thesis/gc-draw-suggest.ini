┌──────────────────────────────────────────────────────────────────────┐
│                    图 4-x  Scavenge 算法原理示意图                  │
└──────────────────────────────────────────────────────────────────────┘


① GC 启动前：对象主要位于 Eden 区，Survivor 区为空

                    Roots
          ┌──────────┼──────────┐
          │          │          │
          ▼          ▼          ▼
        root1      root2      root3

┌──────────────────────────────┐      ┌──────────────────────────────┐
│ Eden                         │      │ Survivor                     │
│                              │      │                              │
│  [ A ] ────→ [ B ]           │      │          （空）              │
│    │                         │      │                              │
│    └────→ [ C ]              │      │                              │
│                              │      │                              │
│  [ D ]   [ E ]               │      │                              │
│                              │      │                              │
│  其中：A、B、C 可达；D、E 不可达 │      │                              │
└──────────────────────────────┘      └──────────────────────────────┘



② 从根集合出发，把可达对象复制到 Survivor，并更新根引用

                    Roots
          ┌──────────┼──────────┐
          │          │          │
          ▼          ▼          ▼
        root1      root2      root3
          │
          ▼
┌──────────────────────────────┐      ┌──────────────────────────────┐
│ Eden                         │      │ Survivor                     │
│                              │      │                              │
│  [ A ] --forward--> [ A' ]   │      │  [ A' ]   [ C' ]            │
│    │                         │      │    │                         │
│    └────→ [ C ] --fwd--> C'  │      │    └── scan_ptr             │
│                              │      │         free_ptr ──►         │
│  [ B ]   [ D ]   [ E ]       │      │                              │
│                              │      │                              │
└──────────────────────────────┘      └──────────────────────────────┘

说明：
- 根对象首先被复制到 Survivor
- Eden 中旧对象位置写入转发地址（forwarding address）
- 根引用被改写为指向新对象 A'、C'



③ 线性扫描 Survivor 中的新对象，继续复制它们引用的存活对象

                    Roots
          ┌──────────┼──────────┐
          │          │          │
          ▼          ▼          ▼
       root1→A'   root2→C'    root3

┌──────────────────────────────┐      ┌──────────────────────────────┐
│ Eden                         │      │ Survivor                     │
│                              │      │                              │
│  [ A ] --forward--> [ A' ]   │      │  [ A' ] ───→ [ B' ]         │
│  [ B ] --forward--> [ B' ]   │      │    │                         │
│  [ C ] --forward--> [ C' ]   │      │    └────→ [ C' ]            │
│                              │      │                              │
│  [ D ]   [ E ]               │      │        scan_ptr ──►          │
│                              │      │               free_ptr ──►    │
└──────────────────────────────┘      └──────────────────────────────┘

说明：
- 扫描 A' 时发现它还引用 Eden 中的 B
- B 仍然存活，因此被继续复制到 Survivor
- 之后继续扫描 B'、C' …… 直到 scan_ptr 追上 free_ptr
- 不可达对象 D、E 不会被复制，因而自然被回收



④ 扫描完成后，交换半空间角色（Flip）

                    Roots
          ┌──────────┼──────────┐
          │          │          │
          ▼          ▼          ▼
       root1→A'   root2→C'    root3

┌──────────────────────────────┐      ┌──────────────────────────────┐
│ New Eden（原 Survivor）      │      │ New Survivor（原 Eden）      │
│                              │      │                              │
│  [ A' ] ───→ [ B' ]          │      │      （整块可复用）          │
│    │                         │      │                              │
│    └────→ [ C' ]             │      │   原来的 D、E 被丢弃         │
│                              │      │                              │
│   存活对象继续运行            │      │   等待下一轮分配/回收         │
└──────────────────────────────┘      └──────────────────────────────┘

说明：
- 所有存活对象已经连续复制到新半空间
- 原半空间整体清空并复用
- 这样既完成回收，又避免了外部内存碎片

## 这张图最推荐的正式画法
### 建议分成 4 个子图
- ① GC 前
- ② 根对象复制
- ③ 线性扫描与继续复制
- ④ 半空间翻转
### 每一部分最该强调的视觉元素
- Roots ：放在最上方
- Eden / Survivor ：左右并排
- forwarding address ：用虚线箭头或浅色箭头
- scan_ptr / free_ptr ：用两个不同颜色的小指针
- 不可达对象 ：灰色
- 新复制对象 ：橙色或绿色
### 配色建议
- 根对象 / 根引用：蓝色
- 新复制到 Survivor 的存活对象：橙色
- 不可达对象：灰色
- forwarding address：虚线浅蓝
- scan/free 指针：红色/绿色
